server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 80;
    listen [::]:80;
    server_name cn.scitoday.scitoday-chd.xyz scitoday.scitoday-chd.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name cn.scitoday.scitoday-chd.xyz scitoday.scitoday-chd.xyz;

    ssl_certificate /etc/letsencrypt/live/cn.scitoday.scitoday-chd.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cn.scitoday.scitoday-chd.xyz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    # HSTS 由真正终止 TLS 的 Nginx 统一负责。
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 64m;
    client_body_timeout 600s;

    # 运营管理台只允许通过后端本机端口访问，不暴露到公网域名。
    location = /admin {
        return 404;
    }

    location ^~ /admin/ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:5201;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 后端也会在识别 HTTPS 后设置 HSTS；隐藏它以避免同名响应头重复。
        proxy_hide_header Strict-Transport-Security;

        proxy_request_buffering off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
